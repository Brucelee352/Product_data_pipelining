version: 2

sources:
  - name: kroger_raw
    database: kroger_pipeline
    schema: raw
    tables:
      - name: locations
        description: "Raw Kroger store locations fetched from the Locations API."
      - name: products
        description: "Raw Kroger products fetched from the Products API."
      - name: product_prices
        description: "Raw per-location product pricing, fulfillment, and inventory data."

models:
  # Staging models (views)
  - name: stg_products
    description: "Cleaned product catalog with primary category extracted from the categories JSON array."
    columns:
      - name: product_id
        description: "13-digit UPC, unique product identifier."
        tests:
          - unique
          - not_null
      - name: description
        description: "Product name."
      - name: brand
        description: "Brand name."
      - name: primary_category
        description: "First category in the categories array."
      - name: categories
        description: "JSON string array of all categories."

  - name: stg_locations
    description: "Cleaned Kroger store locations with valid geolocation."
    columns:
      - name: location_id
        description: "8-digit Kroger location identifier."
        tests:
          - unique
          - not_null
      - name: name
        description: "Store name."
      - name: state
        description: "Two-letter state code."
      - name: latitude
        description: "Store latitude."
      - name: longitude
        description: "Store longitude."

  - name: stg_prices
    description: "Cleaned product prices with derived discount fields, filtered to valid regular prices."
    columns:
      - name: product_id
        description: "Product UPC."
        tests:
          - not_null
      - name: location_id
        description: "Store location identifier."
        tests:
          - not_null
      - name: regular_price
        description: "Regular shelf price."
      - name: promo_price
        description: "Promotional/sale price when on offer."
      - name: discount_amount
        description: "Regular price minus promo price (0 when no promo)."
      - name: discount_pct
        description: "Discount percentage off regular price."

  # Mart models (tables)
  - name: dim_products
    description: "Product dimension."
    columns:
      - name: product_id
        description: "Product UPC."
        tests:
          - unique
          - not_null

  - name: dim_locations
    description: "Location dimension."
    columns:
      - name: location_id
        description: "Store location identifier."
        tests:
          - unique
          - not_null

  - name: fact_prices
    description: "Price fact table joining prices with product and location dimensions."
    columns:
      - name: product_id
        description: "Product UPC."
        tests:
          - not_null
      - name: location_id
        description: "Store location identifier."
        tests:
          - not_null

  - name: mart_category_distribution
    description: "Product count and average pricing aggregated by category."
    columns:
      - name: category
        description: "Product category."
        tests:
          - not_null

  - name: mart_price_by_category
    description: "Price distribution statistics (mean, quartiles, median) by category and effective date."
    columns:
      - name: category
        description: "Product category."
        tests:
          - not_null

  - name: mart_location_sales
    description: "Per-location fulfillment counts, product totals, and dominant fulfillment type."
    columns:
      - name: location_id
        description: "Store location identifier."
        tests:
          - unique
          - not_null
